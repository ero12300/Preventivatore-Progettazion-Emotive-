
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preventivatore Progettazione Emotive</title>
    <meta name="theme-color" content="#050505">
    <link rel="icon" type="image/svg+xml" href="/emotive-logo.svg">
    <link rel="apple-touch-icon" href="/emotive-logo.svg">
    <link rel="manifest" href="/site.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'brand-gold': '#c5a059',
                'brand-dark': '#050505',
                'brand-obsidian': '#050505',
              }
            }
          }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-gold: #c5a059;
            --brand-obsidian: #050505;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            scroll-behavior: smooth;
            background-color: #fcfcfc;
            color: var(--brand-obsidian);
        }
        .serif { font-family: 'Playfair Display', serif; }
        
        /* EMOTIVE LOGO STYLE */
        .emotive-logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 0.8;
        }
        .emotive-logo-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-weight: 900;
            letter-spacing: -0.05em;
            transform: rotate(180deg);
            font-size: 2rem;
            color: #000;
        }
        .emotive-logo-square {
            width: 12px;
            height: 12px;
            background-color: #000;
            margin-bottom: 4px;
        }

        /* BUTTONS — primario oro (profondità, pill, coerente su tutta l'app) */
        .btn-emotive-primary {
            position: relative;
            display: inline-block;
            text-align: center;
            color: #0a0a0a;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            padding: 1.25rem 2.5rem;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: linear-gradient(
                165deg,
                #e8d5a8 0%,
                #d4bc78 18%,
                #c5a059 50%,
                #a8863d 88%,
                #8f6f2e 100%
            );
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.35) inset,
                0 10px 28px -6px rgba(197, 160, 89, 0.55),
                0 4px 12px -4px rgba(0, 0, 0, 0.45);
            transition:
                transform 0.22s cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 0.22s ease,
                filter 0.22s ease,
                background 0.22s ease;
        }
        .btn-emotive-primary:hover:not(:disabled) {
            filter: brightness(1.06);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.45) inset,
                0 16px 40px -8px rgba(197, 160, 89, 0.65),
                0 8px 20px -6px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }
        .btn-emotive-primary:active:not(:disabled) {
            transform: translateY(0);
            filter: brightness(0.98);
            box-shadow:
                0 2px 8px rgba(0, 0, 0, 0.35) inset,
                0 6px 20px -6px rgba(197, 160, 89, 0.4);
        }
        .btn-emotive-primary:focus-visible {
            outline: 2px solid rgba(197, 160, 89, 0.9);
            outline-offset: 3px;
        }
        .btn-emotive-primary:disabled {
            background: linear-gradient(165deg, #4a4a4a, #2d2d2d);
            border-color: rgba(255, 255, 255, 0.08);
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
            filter: none;
        }

        /* Secondario su sfondo scuro (Indietro, azioni outline) */
        .btn-emotive-ghost-dark {
            display: inline-block;
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            padding: 1.25rem 2rem;
            border-radius: 9999px;
            color: rgba(255, 255, 255, 0.82);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06) inset;
            transition:
                border-color 0.22s ease,
                background 0.22s ease,
                color 0.22s ease,
                box-shadow 0.22s ease,
                transform 0.22s ease;
        }
        .btn-emotive-ghost-dark:hover {
            color: #fff;
            border-color: rgba(197, 160, 89, 0.55);
            background: rgba(197, 160, 89, 0.1);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.08) inset,
                0 12px 32px -10px rgba(197, 160, 89, 0.25);
            transform: translateY(-1px);
        }
        .btn-emotive-ghost-dark:active {
            transform: translateY(0);
        }
        .btn-emotive-ghost-dark:focus-visible {
            outline: 2px solid rgba(197, 160, 89, 0.7);
            outline-offset: 3px;
        }

        /* Piccoli CTA oro outline su dark (Aggiungi, Ricalcola, ecc.) */
        .btn-emotive-gold-soft {
            display: inline-block;
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            padding: 0.65rem 1.25rem;
            border-radius: 9999px;
            font-size: 10px;
            color: var(--brand-gold);
            background: rgba(197, 160, 89, 0.08);
            border: 1px solid rgba(197, 160, 89, 0.42);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.06) inset;
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }
        .btn-emotive-gold-soft:hover:not(:disabled) {
            background: rgba(197, 160, 89, 0.16);
            border-color: rgba(197, 160, 89, 0.65);
            box-shadow: 0 8px 24px -8px rgba(197, 160, 89, 0.35);
            transform: translateY(-1px);
        }
        .btn-emotive-gold-soft:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .btn-emotive-outline {
            background-color: transparent;
            color: #000;
            border: 2px solid #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            padding: 1.25rem 2.5rem;
            border-radius: 9999px;
            transition: all 0.3s ease;
        }
        .btn-emotive-outline:hover {
            background-color: #000;
            color: #fff;
        }

        .blueprint-bg {
            background-image: radial-gradient(rgba(197, 160, 89, 0.15) 1px, transparent 0);
            background-size: 30px 30px;
        }

        input[type="checkbox"] {
            accent-color: var(--brand-gold);
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
        }

        .pdf-shadow {
            box-shadow: 0 60px 100px -20px rgba(0,0,0,0.12);
        }

        /* ANIMATIONS */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-reveal {
            animation: reveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* PRINT STYLES FOR PDF GENERATION */
        @media print {
            header, footer, nav, button, .no-print, .action-bar-container {
                display: none !important;
            }
            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            main {
                padding: 0 !important;
                margin: 0 !important;
            }
            .min-h-screen {
                min-height: auto !important;
                padding-top: 0 !important;
                padding-bottom: 0 !important;
            }
            .max-w-5xl {
                max-width: 100% !important;
                margin: 0 !important;
                width: 100% !important;
            }
            .pdf-shadow {
                box-shadow: none !important;
                border: 1px solid #eee !important;
            }
            .blueprint-bg {
                background-image: none !important;
            }
            .pdf-container {
                padding: 0 !important;
                margin: 0 !important;
            }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
